# Сборка/запуск: docker compose up --build  |  docker compose up -d  |  docker-compose up -d
# Порт на хосте по умолчанию 8002 (8000 часто занят другим stack: app-1:8000). Переопределение: KNOWLEDGE_API_PORT в .env в корне репо.
# Перед первым запуском: copy app\.env.example app\.env (файл нужен; для dev достаточно пустых ключей) или scripts\ensure-app-env.ps1
#
# Wheel / PyPI: README (WHEEL_MODE=online | offline). Каталог local-dist\wheels для offline: .\scripts\refresh-wheels-in-linux-container.ps1

services:
  knowledge-api:
    build:
      context: .
      dockerfile: Dockerfile
      # Wheelhouse для offline: отдельный контекст (на Windows bind local-dist/wheels в RUN --mount часто пустой).
      additional_contexts:
        wheelhouse: ./local-dist/wheels
      # Не тянуть базовый образ с Hub при каждой сборке — если python:3.12-slim уже локальный
      # (docker pull или docker load), сборка не упирается в прокси/CONNECT к registry-1.docker.io.
      # Первый раз без локального образа: docker pull python:3.12-slim или .\scripts\docker-ensure-base-image.ps1
      pull: false
      args:
        WHEEL_MODE: ${WHEEL_MODE:-online}
    image: rag_knowledge_base-knowledge-api:local
    container_name: rag_knowledge_base-knowledge-api
    ports:
      - "${KNOWLEDGE_API_PORT:-8002}:8000"
    environment:
      APP_DATA_DIR: /data
      # Показывать в логе старта ссылку с портом хоста (http://127.0.0.1:…), а не внутри контейнера
      APP_EXPOSED_PORT: ${KNOWLEDGE_API_PORT:-8002}
    env_file:
      - app/.env
    # Снижает Errno -3 (Temporary failure in name resolution) в Linux/Docker, если resolv хоста/ВПН отдаёт битый DNS.
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - knowledge_data:/data
    restart: unless-stopped

volumes:
  knowledge_data:
